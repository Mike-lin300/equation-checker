<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen-VL OCR 识别测试</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .upload-zone {
      border: 3px dashed #cbd5e1;
      transition: all 0.3s ease;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    .upload-zone.has-image {
      border-style: solid;
      border-color: #10b981;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body class="text-slate-800">
  <!-- 顶部标题栏 -->
  <header class="bg-white/90 backdrop-blur-sm shadow-lg py-4 px-4">
    <div class="max-w-6xl mx-auto">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-blue-500 rounded-lg flex items-center justify-center">
            <i data-lucide="eye" class="w-6 h-6 text-white"></i>
          </div>
          <div>
            <h1 class="text-xl md:text-2xl font-bold text-slate-800">Qwen-VL OCR 识别测试</h1>
            <p class="text-slate-500 text-sm">基于通义千问视觉模型的图片文字识别</p>
          </div>
        </div>
        <a href="/solver" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors flex items-center gap-2">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          <span>返回判题系统</span>
        </a>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="max-w-6xl mx-auto px-4 py-8 space-y-6">
    
    <!-- 图片上传区域 -->
    <section class="bg-white rounded-xl shadow-xl p-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-8 h-8 bg-purple-600 text-white rounded-full flex items-center justify-center font-bold">1</div>
        <h2 class="text-xl font-bold text-slate-800">上传图片</h2>
      </div>

      <!-- 上传区域 -->
      <div id="uploadZone" class="upload-zone rounded-lg p-8 text-center cursor-pointer">
        <input type="file" id="imageInput" accept="image/*" class="hidden">
        <div id="uploadPlaceholder">
          <i data-lucide="upload-cloud" class="w-16 h-16 mx-auto text-slate-400 mb-4"></i>
          <p class="text-lg text-slate-600 mb-2">点击或拖拽图片到此处</p>
          <p class="text-sm text-slate-400">支持 JPG、PNG、GIF 等格式</p>
        </div>
        <div id="imagePreview" class="hidden">
          <img id="previewImg" class="max-h-96 mx-auto rounded-lg shadow-md" alt="预览">
          <button id="removeImage" class="mt-4 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors">
            <i data-lucide="trash-2" class="w-4 h-4 inline-block mr-1"></i>
            移除图片
          </button>
        </div>
      </div>

      <!-- 提示词输入 -->
      <div class="mt-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">识别提示词（可选）</label>
        <input 
          type="text" 
          id="promptInput" 
          placeholder="例如：请识别图中的数学公式 / 请提取图中的文字内容"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
        >
        <p class="text-xs text-slate-500 mt-1">留空则使用默认提示："请识别图中的文字内容"</p>
      </div>

      <!-- 识别按钮 -->
      <button id="recognizeBtn" class="mt-4 w-full py-3 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white rounded-lg font-semibold shadow-lg transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
        <i data-lucide="scan" class="w-5 h-5"></i>
        <span>开始识别</span>
      </button>
    </section>

    <!-- 识别结果区域 -->
    <section id="resultSection" class="bg-white rounded-xl shadow-xl p-6 hidden">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-8 h-8 bg-green-600 text-white rounded-full flex items-center justify-center font-bold">2</div>
        <h2 class="text-xl font-bold text-slate-800">识别结果</h2>
      </div>

      <!-- 加载状态 -->
      <div id="loadingState" class="hidden text-center py-8">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600 mb-4"></div>
        <p class="text-slate-600">正在识别中，请稍候...</p>
      </div>

      <!-- 结果展示 -->
      <div id="resultContent" class="hidden">
        <div class="p-4 bg-gradient-to-br from-purple-50 to-blue-50 rounded-lg border border-purple-200">
          <h3 class="font-semibold text-purple-800 mb-2 flex items-center gap-2">
            <i data-lucide="file-text" class="w-4 h-4"></i>
            识别内容
          </h3>
          <div id="ocrResult" class="text-slate-700 whitespace-pre-wrap leading-relaxed"></div>
        </div>

        <!-- Token 使用情况 -->
        <div id="usageInfo" class="mt-4 p-3 bg-slate-50 rounded-lg border border-slate-200 text-sm text-slate-600">
          <!-- 动态填充 -->
        </div>
      </div>

      <!-- 错误信息 -->
      <div id="errorState" class="hidden">
        <div class="p-4 bg-red-50 border border-red-300 rounded-lg">
          <div class="flex items-start gap-3">
            <i data-lucide="alert-circle" class="w-5 h-5 text-red-600 flex-shrink-0 mt-0.5"></i>
            <div>
              <h3 class="font-semibold text-red-800 mb-1">识别失败</h3>
              <p id="errorMessage" class="text-red-700 text-sm"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- 页脚 -->
  <footer class="mt-8 py-6 text-center text-white/80 text-sm">
    <p>© 2026 Qwen-VL OCR 识别测试系统 | 基于阿里云通义千问视觉模型</p>
  </footer>

  <script>
    // 初始化图标
    lucide.createIcons();

    // DOM 元素
    const uploadZone = document.getElementById('uploadZone');
    const imageInput = document.getElementById('imageInput');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const removeImage = document.getElementById('removeImage');
    const recognizeBtn = document.getElementById('recognizeBtn');
    const promptInput = document.getElementById('promptInput');
    const resultSection = document.getElementById('resultSection');
    const loadingState = document.getElementById('loadingState');
    const resultContent = document.getElementById('resultContent');
    const errorState = document.getElementById('errorState');
    const ocrResult = document.getElementById('ocrResult');
    const errorMessage = document.getElementById('errorMessage');
    const usageInfo = document.getElementById('usageInfo');

    let currentImageFile = null;

    // 点击上传区域
    uploadZone.addEventListener('click', () => {
      if (!currentImageFile) {
        imageInput.click();
      }
    });

    // 文件选择
    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        handleImageFile(file);
      }
    });

    // 拖拽事件
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleImageFile(file);
      }
    });

    // 处理图片文件
    function handleImageFile(file) {
      currentImageFile = file;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        uploadPlaceholder.classList.add('hidden');
        imagePreview.classList.remove('hidden');
        uploadZone.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    }

    // 移除图片
    removeImage.addEventListener('click', (e) => {
      e.stopPropagation();
      currentImageFile = null;
      imageInput.value = '';
      uploadPlaceholder.classList.remove('hidden');
      imagePreview.classList.add('hidden');
      uploadZone.classList.remove('has-image');
    });

    // 开始识别
    recognizeBtn.addEventListener('click', async () => {
      if (!currentImageFile) {
        alert('请先上传图片！');
        return;
      }

      // 显示结果区域和加载状态
      resultSection.classList.remove('hidden');
      loadingState.classList.remove('hidden');
      resultContent.classList.add('hidden');
      errorState.classList.add('hidden');
      recognizeBtn.disabled = true;

      try {
        // 准备表单数据
        const formData = new FormData();
        formData.append('image', currentImageFile);
        
        const prompt = promptInput.value.trim();
        if (prompt) {
          formData.append('prompt', prompt);
        }

        // 发送请求
        const response = await fetch('/api/ocr', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '识别失败');
        }

        // 显示结果
        ocrResult.textContent = data.result;
        
        // 显示 Token 使用情况
        if (data.usage) {
          usageInfo.innerHTML = `
            <div class="flex items-center gap-2 mb-1">
              <i data-lucide="info" class="w-4 h-4"></i>
              <span class="font-medium">Token 使用情况：</span>
            </div>
            <div class="ml-6 space-y-1">
              <p>输入 Token: ${data.usage.prompt_tokens || 0}</p>
              <p>输出 Token: ${data.usage.completion_tokens || 0}</p>
              <p>总 Token: ${data.usage.total_tokens || 0}</p>
            </div>
          `;
          lucide.createIcons();
        }

        loadingState.classList.add('hidden');
        resultContent.classList.remove('hidden');

      } catch (error) {
        loadingState.classList.add('hidden');
        errorState.classList.remove('hidden');
        errorMessage.textContent = error.message;
      } finally {
        recognizeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
