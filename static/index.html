<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一元二次方程判题助手</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; margin-bottom: 15px; }
        button { padding: 10px 20px; background: #4A90D9; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; }
        .error { color: #d9534f; }
        .correct { color: #5cb85c; }
    </style>
</head>
<body>
    <h2>一元二次方程解题步骤判题</h2>
    <p>请输入每一步（每行一步）：</p>
    <textarea id="stepsInput" placeholder="例如：
x²-5x+6=0
(x-2)(x-3)=0
x=2 或 x=3"></textarea>
    <br/>
    <button onclick="checkSolution()">提交批改</button>

    <div id="result"></div>

    <script>
        async function checkSolution() {
            const text = document.getElementById('stepsInput').value.trim();
            if (!text) return alert('请输入解题步骤');

            // 按行分割，过滤空行
            const steps = text.split('\n').filter(line => line.trim() !== '');

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在批改中...';

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ steps: steps })
                });
                const data = await response.json();

                if (data.error) {
                    resultDiv.innerHTML = `<span class="error">批改出错：${data.error}</span>`;
                    return;
                }

                // 显示结果
                let html = '';
                if (data.correct) {
                    html += '<div class="correct">✅ 完全正确！</div>';
                } else {
                    html += `<div class="error">❌ 发现错误</div>`;
                    html += `<p><strong>错误位置：</strong>${data.error_step || '未定位'}</p>`;
                    html += `<p><strong>错误类型：</strong>${data.error_type || '未知'}</p>`;
                    if (data.hint) html += `<p><strong>提示：</strong>${data.hint}</p>`;
                }
                if (data.exercises && data.exercises.length) {
                    html += '<h4> 推荐练习：</h4><ol>';
                    data.exercises.forEach(q => html += `<li>${q}</li>`);
                    html += '</ol>';
                }
                resultDiv.innerHTML = html;
            } catch (err) {
                resultDiv.innerHTML = `<span class="error">请求失败：${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
